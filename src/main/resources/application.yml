###################################################################

server:
  address: 0.0.0.0
  port: 8763

spring:
  application:
    name: metadata-service

  # ---------------- REDIS ----------------
  data:
    redis:
      url: redis://default:ItRBEjljWMXDHICNFJdCxBTjGIHPmzMk@centerbeam.proxy.rlwy.net:25969

  # ---------------- DATABASE ----------------
  datasource:
    url: jdbc:mysql://shinkansen.proxy.rlwy.net:39756/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD:pNXyuMURcClGkORjMGPzkfZezcuwjhkj}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---------------- JPA ----------------
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  # ---------------- CACHE ----------------
  cache:
    type: none


# ---------------- SWAGGER ----------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html


# ---------------- EUREKA CLIENT ----------------
eureka:
  client:
    service-url:
      defaultZone: https://microservice-i7nc.onrender.com/eureka/
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true
    instance-id: metadata-service:${random.value}
    lease-renewal-interval-in-seconds: 10


# ---------------- METADATA CONFIG ----------------
metadata:
  key:
    pattern: "^[a-zA-Z_][a-zA-Z0-9_.]*$"


# ---------------- ACTUATOR ----------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
